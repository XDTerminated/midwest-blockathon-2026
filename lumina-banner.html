<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Lumina Banner</title>
<link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&family=Questrial&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .banner {
    width: 1280px;
    height: 720px;
    background: radial-gradient(ellipse at 42% 45%, #1a1e2e 0%, #121620 60%, #0a0d14 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .glow {
    position: absolute;
    top: 50%;
    left: 42%;
    transform: translate(-50%, -50%);
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(212,173,90,0.12) 0%, rgba(212,173,90,0.04) 40%, transparent 70%);
    pointer-events: none;
  }
  .content {
    display: flex;
    align-items: center;
    gap: 32px;
    position: relative;
    z-index: 1;
  }
  .candle-wrap {
    position: relative;
  }
  .candle-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(212,173,90,0.25) 0%, rgba(212,173,90,0.08) 40%, transparent 70%);
    border-radius: 50%;
  }
  .text-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .logo-name {
    font-family: 'Quantico', sans-serif;
    font-weight: 700;
    font-size: 96px;
    color: #D4AD5A;
    letter-spacing: 4px;
    line-height: 1;
    text-shadow: 0 0 40px rgba(212,173,90,0.3);
  }
  .tagline {
    font-family: 'Questrial', sans-serif;
    font-size: 20px;
    color: #9CA3AF;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="glow"></div>
    <div class="content">
      <div class="candle-wrap">
        <div class="candle-glow"></div>
        <svg viewBox="0 0 64 96" fill="none" width="140" height="210">
          <rect x="20" y="40" width="24" height="52" rx="4" fill="#d4c89a"/>
          <rect x="30" y="32" width="4" height="12" rx="2" fill="#4a4a3a"/>
          <path d="M32 4 C26 16, 20 24, 22 32 C24 38, 28 40, 32 40 C36 40, 40 38, 42 32 C44 24, 38 16, 32 4Z" fill="url(#fo)" opacity="0.3" filter="blur(3px)"/>
          <path d="M32 4 C26 16, 20 24, 22 32 C24 38, 28 40, 32 40 C36 40, 40 38, 42 32 C44 24, 38 16, 32 4Z" fill="url(#fo)"/>
          <path d="M32 14 C29 20, 26 26, 28 32 C29 36, 31 38, 32 38 C33 38, 35 36, 36 32 C38 26, 35 20, 32 14Z" fill="url(#fi)"/>
          <defs>
            <linearGradient id="fo" x1="32" y1="4" x2="32" y2="40" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#FFD54F"/>
              <stop offset="40%" stop-color="#FF9800"/>
              <stop offset="100%" stop-color="#E65100"/>
            </linearGradient>
            <linearGradient id="fi" x1="32" y1="14" x2="32" y2="38" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#FFF9C4"/>
              <stop offset="60%" stop-color="#FFE082"/>
              <stop offset="100%" stop-color="#FFB74D"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="text-group">
        <div class="logo-name">Lumina</div>
        <div class="tagline">Community Immigration Legal Research</div>
      </div>
    </div>
  </div>
</body>
</html>
